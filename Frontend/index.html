<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UTIDOL - Panel Médico</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #004494; }
        #resultado { margin-top: 15px; padding: 15px; background-color: #e9ecef; border-radius: 4px; display: none; white-space: pre-line;}
    </style>
</head>
<body>

    <div class="panel">
        <h2>🔄 Rotación a Metadona</h2>
        
        <label>Dosis equivalente de morfina diaria (OME):</label>
        <input type="number" id="dosisMorfina" placeholder="Ej. 120">
        
        <label>
            <input type="checkbox" id="checkDosisAlta"> 
            Paciente proviene de dosis altas (>60mg)
        </label>

        <button onclick="calcular()">Generar Pauta Analgésica</button>

        <div id="resultado"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
